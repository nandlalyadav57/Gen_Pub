name: "Failover Switch (Main <-> DR)"

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Failover Action'
        required: true
        type: choice
        options:
          - 'switch_to_dr'
          - 'restore_to_main'
        default: 'switch_to_dr'
      confirm:
        description: 'Type CONFIRM to proceed'
        required: true
        type: string

permissions:
  contents: write

jobs:
  failover:
    name: Execute Failover
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: "Checkout Main Repo (nandlalyadav57)"
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: "Checkout DR Repo (ny5457)"
        uses: actions/checkout@v4
        with:
          repository: ny5457/General
          token: ${{ secrets.DR_SYNC_TOKEN }}
          path: dr-repo
          fetch-depth: 0

      - name: "Read Current ACTIVE_REPO Markers"
        id: read_markers
        run: |
          # Read marker files
          MAIN_STATUS=$(cat .ACTIVE_REPO 2>/dev/null || echo "missing")
          DR_STATUS=$(cat dr-repo/.ACTIVE_REPO 2>/dev/null || echo "missing")

          echo "main_status=$MAIN_STATUS" >> $GITHUB_OUTPUT
          echo "dr_status=$DR_STATUS" >> $GITHUB_OUTPUT

          echo "### 📊 Current Repository Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Repository | Status | Marker File |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|--------|-------------|" >> $GITHUB_STEP_SUMMARY

          if [ "$MAIN_STATUS" == "active" ]; then
            echo "| **Main (nandlalyadav57)** | 🟢 ACTIVE | \`$MAIN_STATUS\` |" >> $GITHUB_STEP_SUMMARY
          elif [ "$MAIN_STATUS" == "passive" ]; then
            echo "| **Main (nandlalyadav57)** | 🟡 PASSIVE | \`$MAIN_STATUS\` |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| **Main (nandlalyadav57)** | ❌ MISSING | \`$MAIN_STATUS\` |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "$DR_STATUS" == "active" ]; then
            echo "| **DR (ny5457)** | 🟢 ACTIVE | \`$DR_STATUS\` |" >> $GITHUB_STEP_SUMMARY
          elif [ "$DR_STATUS" == "passive" ]; then
            echo "| **DR (ny5457)** | 🟡 PASSIVE | \`$DR_STATUS\` |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| **DR (ny5457)** | ❌ MISSING | \`$DR_STATUS\` |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY

          # Validate state
          if [ "$MAIN_STATUS" == "active" ] && [ "$DR_STATUS" == "passive" ]; then
            echo "**✅ Normal state:** Main is active, DR is standby" >> $GITHUB_STEP_SUMMARY
          elif [ "$DR_STATUS" == "active" ] && [ "$MAIN_STATUS" == "passive" ]; then
            echo "**⚠️ Failover state:** DR is active, Main is standby" >> $GITHUB_STEP_SUMMARY
          elif [ "$MAIN_STATUS" == "active" ] && [ "$DR_STATUS" == "active" ]; then
            echo "**❌ ERROR:** Both repos marked ACTIVE (conflict!)" >> $GITHUB_STEP_SUMMARY
          elif [ "$MAIN_STATUS" == "passive" ] && [ "$DR_STATUS" == "passive" ]; then
            echo "**❌ ERROR:** Both repos marked PASSIVE (no active repo!)" >> $GITHUB_STEP_SUMMARY
          else
            echo "**❌ ERROR:** Invalid or missing marker files" >> $GITHUB_STEP_SUMMARY
          fi

      - name: "Restore Main as Primary"
        if: ${{ inputs.action == 'restore_to_main' }}
        run: |
          # Validate confirmation
          if [ "${{ inputs.confirm }}" != "CONFIRM" ]; then
            echo "❌ ERROR: Must type CONFIRM to proceed" >&2
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "---" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### ❌ Activation Cancelled" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "You must type **CONFIRM** in the confirmation field." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔄 Activating Main as Primary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Update markers
          echo "active" > .ACTIVE_REPO
          echo "passive" > dr-repo/.ACTIVE_REPO

          # Commit to Main
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .ACTIVE_REPO
          git commit -m "Failover: Set Main as ACTIVE (restored from DR)" || echo "No changes in Main"
          git push

          # Commit to DR
          cd dr-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .ACTIVE_REPO
          git commit -m "Failover: Set DR as PASSIVE (standby mode)" || echo "No changes in DR"
          git push

          cd ..

          echo "✅ **Main (nandlalyadav57) is now ACTIVE**" >> $GITHUB_STEP_SUMMARY
          echo "✅ **DR (ny5457) is now PASSIVE**" >> $GITHUB_STEP_SUMMARY

      - name: "Switch to DR (FAILOVER)"
        if: ${{ inputs.action == 'switch_to_dr' }}
        run: |
          # Validate confirmation
          if [ "${{ inputs.confirm }}" != "CONFIRM" ]; then
            echo "❌ ERROR: Must type CONFIRM to proceed with failover" >&2
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "---" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### ❌ Failover Cancelled" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "You must type **CONFIRM** for disaster recovery activation." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ⚠️ DISASTER RECOVERY: Activating DR" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Update markers
          echo "passive" > .ACTIVE_REPO
          echo "active" > dr-repo/.ACTIVE_REPO

          # Commit to Main
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .ACTIVE_REPO
          git commit -m "Failover: Set Main as PASSIVE (switched to DR)" || echo "No changes in Main"
          git push

          # Commit to DR
          cd dr-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .ACTIVE_REPO
          git commit -m "Failover: Set DR as ACTIVE (disaster recovery mode)" || echo "No changes in DR"
          git push

          cd ..

          echo "⚠️ **DR (ny5457) is now ACTIVE (FAILOVER MODE)**" >> $GITHUB_STEP_SUMMARY
          echo "⚠️ **Main (nandlalyadav57) is now PASSIVE**" >> $GITHUB_STEP_SUMMARY

      - name: "Authenticate GitHub CLI"
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token

      - name: "Enable/Disable Workflows (Restore Main)"
        if: ${{ inputs.action == 'restore_to_main' }}
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Workflow Updates:**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Enable Main workflows
          echo "✅ Enabling workflows in nandlalyadav57/General..." >> $GITHUB_STEP_SUMMARY
          gh workflow list --repo nandlalyadav57/General --all | grep disabled | awk '{print $NF}' | while read id; do
            gh workflow enable "$id" --repo nandlalyadav57/General 2>&1 || true
          done

          # Disable DR workflows
          echo "🚫 Disabling workflows in ny5457/General..." >> $GITHUB_STEP_SUMMARY
          gh workflow list --repo ny5457/General --all | grep active | awk '{print $NF}' | while read id; do
            gh workflow disable "$id" --repo ny5457/General 2>&1 || true
          done

      - name: "Enable/Disable Workflows (Switch to DR)"
        if: ${{ inputs.action == 'switch_to_dr' }}
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Workflow Updates:**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Enable DR workflows
          echo "✅ Enabling workflows in ny5457/General..." >> $GITHUB_STEP_SUMMARY
          gh workflow list --repo ny5457/General --all | grep disabled | awk '{print $NF}' | while read id; do
            gh workflow enable "$id" --repo ny5457/General 2>&1 || true
          done

          # Disable Main workflows
          echo "🚫 Disabling workflows in nandlalyadav57/General..." >> $GITHUB_STEP_SUMMARY
          gh workflow list --repo nandlalyadav57/General --all | grep active | awk '{print $NF}' | while read id; do
            gh workflow disable "$id" --repo nandlalyadav57/General 2>&1 || true
          done

      - name: "Final Summary"
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ✅ Failover Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**What happened:**" >> $GITHUB_STEP_SUMMARY
          echo "1. ✅ Updated \`.ACTIVE_REPO\` markers in both repos" >> $GITHUB_STEP_SUMMARY
          echo "2. ✅ Committed marker changes" >> $GITHUB_STEP_SUMMARY
          echo "3. ✅ Enabled/disabled workflows accordingly" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Next steps:**" >> $GITHUB_STEP_SUMMARY
          echo "- Sync script will automatically sync FROM active TO passive" >> $GITHUB_STEP_SUMMARY
          echo "- Desktop shortcut respects new active repo" >> $GITHUB_STEP_SUMMARY
          echo "- Run \`status\` action to verify anytime" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Workflow:** \`${{ inputs.action }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "**Time:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
