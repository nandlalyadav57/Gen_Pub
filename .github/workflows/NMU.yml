      #   if: always()
      #   run: |
      #     cd Scripts/FB
      #
      #     # Check if history file exists
      #     if [ -f "nmu_content_history.json" ]; then
      #       echo "✅ History file found - committing to prevent duplicates"
      #
      #       # Configure git
      #       git config user.name "github-actions[bot]"
      #       git config user.email "github-actions[bot]@users.noreply.github.com"
      #
      #       # Add and commit history file
      #       git add nmu_content_history.json
      #
      #       # Only commit if there are changes
      #       if ! git diff --cached --quiet; then
      #         git commit -m "chore: update NMU content history [skip ci]"
      #         git push
      #         echo "✅ History persisted to prevent duplicate posts"
      #       else
      #         echo "ℹ️  No history changes to commit"
      #       fi
      #     else
      #       echo "ℹ️  No history file generated this run"
      #     fi
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
