# This workflow is DR-enabled with automatic failover
# Generated by: enable_dr_for_workflow.sh

name: 🎯 YouTube Optimizer - Channel Growth Automation

on:
  workflow_dispatch:
    inputs:
      action_mode:
        description: 'What actions to take'
        required: true
        type: choice
        options:
          - 'All Actions (Full Run)'
          - 'Optimization Only (titles, tags, playlists)'
          - 'Engagement Only (comments, replies)'
          - 'Cross-Promotion Only'
          - 'Analytics Only (tracking, no changes)'
        default: 'All Actions (Full Run)'

      dry_run:
        description: 'DRY RUN - Show what would happen (no actual changes)'
        type: boolean
        default: false

  schedule:
    # Daily optimization - 6 AM IST (12:30 AM UTC)
    - cron: "30 0 * * *"
    # Comment replies 3x daily - 9 AM, 3 PM, 9 PM IST
    - cron: "30 3 * * *"
    - cron: "30 9 * * *"
    - cron: "30 15 * * *"
    # Weekly cross-promotion - Saturday 10 AM IST
    - cron: "30 4 * * 6"
    # Weekly analytics - Sunday 7:30 AM IST
    - cron: "0 2 * * 0"

permissions:
  contents: read


jobs:
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # GATEKEEPER: DR Failover Control
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  youtube_master_automation:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      # ========================================
      # SETUP & INITIALIZATION
      # ========================================
      - name: 📋 Workflow Start - Log Configuration
        id: config
        run: |
          echo "╔════════════════════════════════════════════════════════════════╗"
          echo "║                                                                ║"
          echo "║           🎯 YOUTUBE MASTER AUTOMATION                         ║"
          echo "║           Optimize · Engage · Promote · Grow                   ║"
          echo "║                                                                ║"
          echo "╚════════════════════════════════════════════════════════════════╝"
          echo ""
          echo "⏰ TIMING:"
          echo "  UTC:  $(date -u +'%Y-%m-%d %H:%M:%S')"
          echo "  IST:  $(TZ=Asia/Kolkata date +'%Y-%m-%d %H:%M:%S')"
          echo ""
          echo "⚙️  CONFIGURATION:"
          echo "  Trigger: ${{ github.event_name }}"
          echo "  Action Mode: ${{ github.event.inputs.action_mode || 'Scheduled Run' }}"
          echo "  Dry Run: ${{ github.event.inputs.dry_run || 'false' }}"
          echo ""
          # Determine what to run based on schedule or manual input
          MODE="${{ github.event.inputs.action_mode }}"
          HOUR=$(date -u +%H)
          if [ "${{ github.event_name }}" == "schedule" ]; then
            # Scheduled run - determine based on time
            if [ "$HOUR" == "0" ] || [ "$HOUR" == "1" ]; then
              MODE="Optimization Only (titles, tags, playlists)"
              echo "📅 Scheduled: Daily Optimization (6 AM IST)"
            elif [ "$HOUR" == "3" ] || [ "$HOUR" == "9" ] || [ "$HOUR" == "15" ]; then
              MODE="Engagement Only (comments, replies)"
              echo "📅 Scheduled: Comment Engagement"
            elif [ "$HOUR" == "4" ]; then
              MODE="Cross-Promotion Only"
              echo "📅 Scheduled: Weekly Cross-Promotion (Saturday)"
            elif [ "$HOUR" == "2" ]; then
              MODE="Analytics Only (tracking, no changes)"
              echo "📅 Scheduled: Weekly Analytics (Sunday)"
            else
              MODE="All Actions (Full Run)"
              echo "📅 Scheduled: Full Automation Run"
            fi
          fi
          # Set flags for what to run
          case "$MODE" in
            *"All Actions"*)
              echo "run_optimizer=true" >> $GITHUB_OUTPUT
              echo "run_comments=true" >> $GITHUB_OUTPUT
              echo "run_cross_promo=true" >> $GITHUB_OUTPUT
              echo "run_analytics=true" >> $GITHUB_OUTPUT
              ;;
            *"Optimization Only"*)
              echo "run_optimizer=true" >> $GITHUB_OUTPUT
              echo "run_comments=false" >> $GITHUB_OUTPUT
              echo "run_cross_promo=false" >> $GITHUB_OUTPUT
              echo "run_analytics=false" >> $GITHUB_OUTPUT
              ;;
            *"Engagement Only"*)
              echo "run_optimizer=false" >> $GITHUB_OUTPUT
              echo "run_comments=true" >> $GITHUB_OUTPUT
              echo "run_cross_promo=false" >> $GITHUB_OUTPUT
              echo "run_analytics=false" >> $GITHUB_OUTPUT
              ;;
            *"Cross-Promotion Only"*)
              echo "run_optimizer=false" >> $GITHUB_OUTPUT
              echo "run_comments=false" >> $GITHUB_OUTPUT
              echo "run_cross_promo=true" >> $GITHUB_OUTPUT
              echo "run_analytics=false" >> $GITHUB_OUTPUT
              ;;
            *"Analytics Only"*)
              echo "run_optimizer=false" >> $GITHUB_OUTPUT
              echo "run_comments=false" >> $GITHUB_OUTPUT
              echo "run_cross_promo=false" >> $GITHUB_OUTPUT
              echo "run_analytics=true" >> $GITHUB_OUTPUT
              ;;
          esac
          echo ""
          echo "🎯 ACTIONS TO RUN:"
          echo "  Optimizer: $([ '$MODE' == *'All'* ] || [ '$MODE' == *'Optimization'* ] && echo '✅' || echo '⏭️')"
          echo "  Comments: $([ '$MODE' == *'All'* ] || [ '$MODE' == *'Engagement'* ] && echo '✅' || echo '⏭️')"
          echo "  Cross-Promo: $([ '$MODE' == *'All'* ] || [ '$MODE' == *'Cross'* ] && echo '✅' || echo '⏭️')"
          echo "  Analytics: $([ '$MODE' == *'All'* ] || [ '$MODE' == *'Analytics'* ] && echo '✅' || echo '⏭️')"
          echo ""
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
      - name: 🐍 Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: 📦 Install Dependencies
        run: |
          echo "📦 Installing Python packages..."
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install \
            google-api-python-client>=2.100.0 \
            google-auth>=2.23.0 \
            google-auth-oauthlib>=1.1.0 \
            oauth2client
          # Optional: pytrends for trending topics
          python -m pip install pytrends || echo "⚠️  pytrends failed (optional)"

          # Install requests for token validation
          python -m pip install requests
          echo "✅ Dependencies installed"

      - name: 🔒 Validate All Tokens & Sessions
        id: validation
        run: |
          echo "🔐 Validating YouTube, Facebook, and Instagram credentials..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          # Run unified validation (warn mode - only fails on critical tokens)
          python Scripts/validate_all_tokens.py

          VALIDATION_EXIT=$?
          if [ $VALIDATION_EXIT -ne 0 ]; then
            echo ""
            echo "❌ CRITICAL TOKEN VALIDATION FAILED"
            echo "   One or more critical authentication tokens are unhealthy."
            echo "   Cannot proceed with automation to avoid wasted quota/API calls."
            echo ""
            echo "🔧 RECOMMENDED ACTIONS:"
            echo "   1. Check token expiration dates"
            echo "   2. Refresh expired tokens (run token refresh scripts)"
            echo "   3. Verify GitHub Secrets are up to date"
            echo "   4. Review validation logs above for specific failures"
            echo ""
            exit 1
          fi

          echo ""
          echo "✅ Token validation passed - proceeding with automation"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""

      - name: 🔐 Load YouTube Credentials
        id: auth
        run: |
          echo "🔐 Loading credentials for all channels..."
          # Channel 1 (Main - ExploreNYStream)
          YT_FILE1="Scripts/YT/Secrets_Sessions/YT_Tokens1.txt"
          if [ -f "$YT_FILE1" ]; then
            YOUTUBE_1_REFRESH_TOKEN=$(grep 'refresh_token' "$YT_FILE1" | awk -F'=' '{print $2}' | xargs)
            YOUTUBE_1_CLIENT_ID=$(grep 'client_id' "$YT_FILE1" | awk -F'=' '{print $2}' | xargs)
            YOUTUBE_1_CLIENT_SECRET=$(grep 'client_secret' "$YT_FILE1" | awk -F'=' '{print $2}' | xargs)
            echo "✅ Channel 1 credentials loaded from file"
          else
            YOUTUBE_1_REFRESH_TOKEN="${{ secrets.YOUTUBE_REFRESH_TOKEN }}"
            YOUTUBE_1_CLIENT_ID="${{ secrets.YOUTUBE_CLIENT_ID }}"
            YOUTUBE_1_CLIENT_SECRET="${{ secrets.YOUTUBE_CLIENT_SECRET }}"
            echo "✅ Channel 1 credentials loaded from secrets"
          fi
          # Channel 2 (ShortNewsweb)
          YT_FILE2="Scripts/YT/Secrets_Sessions/YT_Tokens2.txt"
          if [ -f "$YT_FILE2" ]; then
            YOUTUBE_2_REFRESH_TOKEN=$(grep 'refresh_token' "$YT_FILE2" | awk -F'=' '{print $2}' | xargs)
            YOUTUBE_2_CLIENT_ID=$(grep 'client_id' "$YT_FILE2" | awk -F'=' '{print $2}' | xargs)
            YOUTUBE_2_CLIENT_SECRET=$(grep 'client_secret' "$YT_FILE2" | awk -F'=' '{print $2}' | xargs)
            echo "✅ Channel 2 credentials loaded"
          fi
          # Channel 3 (FactsAndStoriesTube)
          YT_FILE3="Scripts/YT/Secrets_Sessions/YT_Tokens3.txt"
          if [ -f "$YT_FILE3" ]; then
            YOUTUBE_3_REFRESH_TOKEN=$(grep 'refresh_token' "$YT_FILE3" | awk -F'=' '{print $2}' | xargs)
            YOUTUBE_3_CLIENT_ID=$(grep 'client_id' "$YT_FILE3" | awk -F'=' '{print $2}' | xargs)
            YOUTUBE_3_CLIENT_SECRET=$(grep 'client_secret' "$YT_FILE3" | awk -F'=' '{print $2}' | xargs)
            echo "✅ Channel 3 credentials loaded"
          fi
          # Channel 4 (KiaasaPune)
          YT_FILE4="Scripts/YT/Secrets_Sessions/YT_Tokens4.txt"
          if [ -f "$YT_FILE4" ]; then
            YOUTUBE_4_REFRESH_TOKEN=$(grep 'refresh_token' "$YT_FILE4" | awk -F'=' '{print $2}' | xargs)
            YOUTUBE_4_CLIENT_ID=$(grep 'client_id' "$YT_FILE4" | awk -F'=' '{print $2}' | xargs)
            YOUTUBE_4_CLIENT_SECRET=$(grep 'client_secret' "$YT_FILE4" | awk -F'=' '{print $2}' | xargs)
            echo "✅ Channel 4 (KiaasaPune) credentials loaded"
          else
            # Fallback to env vars if file doesn't exist
            YOUTUBE_4_REFRESH_TOKEN="${{ secrets.KIAASA_REFRESH_TOKEN }}"
            YOUTUBE_4_CLIENT_ID="${{ secrets.KIAASA_CLIENT_ID }}"
            YOUTUBE_4_CLIENT_SECRET="${{ secrets.KIAASA_CLIENT_SECRET }}"
            if [ -n "$YOUTUBE_4_REFRESH_TOKEN" ]; then
              echo "✅ Channel 4 (KiaasaPune) credentials loaded from secrets"
            fi
          fi
          # Save to environment
          {
            echo "YOUTUBE_REFRESH_TOKEN=$YOUTUBE_1_REFRESH_TOKEN"
            echo "YOUTUBE_CLIENT_ID=$YOUTUBE_1_CLIENT_ID"
            echo "YOUTUBE_CLIENT_SECRET=$YOUTUBE_1_CLIENT_SECRET"
            echo "YOUTUBE_CHANNEL_ID=${{ secrets.YOUTUBE_CHANNEL_ID }}"
            echo "YOUTUBE_1_REFRESH_TOKEN=$YOUTUBE_1_REFRESH_TOKEN"
            echo "YOUTUBE_1_CLIENT_ID=$YOUTUBE_1_CLIENT_ID"
            echo "YOUTUBE_1_CLIENT_SECRET=$YOUTUBE_1_CLIENT_SECRET"
            echo "YOUTUBE_2_REFRESH_TOKEN=$YOUTUBE_2_REFRESH_TOKEN"
            echo "YOUTUBE_2_CLIENT_ID=$YOUTUBE_2_CLIENT_ID"
            echo "YOUTUBE_2_CLIENT_SECRET=$YOUTUBE_2_CLIENT_SECRET"
            echo "YOUTUBE_3_REFRESH_TOKEN=$YOUTUBE_3_REFRESH_TOKEN"
            echo "YOUTUBE_3_CLIENT_ID=$YOUTUBE_3_CLIENT_ID"
            echo "YOUTUBE_3_CLIENT_SECRET=$YOUTUBE_3_CLIENT_SECRET"
            echo "YOUTUBE_4_REFRESH_TOKEN=$YOUTUBE_4_REFRESH_TOKEN"
            echo "YOUTUBE_4_CLIENT_ID=$YOUTUBE_4_CLIENT_ID"
            echo "YOUTUBE_4_CLIENT_SECRET=$YOUTUBE_4_CLIENT_SECRET"
            echo "YOUTUBE_CHANNEL_ID_2=${{ secrets.YOUTUBE_CHANNEL_ID_2 }}"
            echo "YOUTUBE_3_CHANNEL_ID=${{ secrets.YOUTUBE_CHANNEL_ID_3 }}"
            echo "YOUTUBE_4_CHANNEL_ID=${{ secrets.KIAASA_CHANNEL_ID }}"
            echo "KIAASA_CHANNEL_ID=${{ secrets.KIAASA_CHANNEL_ID }}"
          } >> $GITHUB_ENV
          echo ""
          echo "✅ All credentials loaded successfully"
      # ========================================
      # ACTION 1: AUTO OPTIMIZER (SEARCH DOMINATION)
      # ========================================
      - name: 🎯 Action 1/5 - Search Domination Optimizer (PRIMARY)
        id: search_optimizer
        if: steps.config.outputs.run_optimizer == 'true'
        continue-on-error: true
        run: |
          echo ""
          echo "╔════════════════════════════════════════════════════════════════╗"
          echo "║  🚀 SEARCH DOMINATION OPTIMIZER (NEW!)                         ║"
          echo "║  → Front-load keywords in titles for search rankings           ║"
          echo "║  → SEO-optimized descriptions (preserves existing content)     ║"
          echo "║  → Strategic tag mix (broad + medium + long-tail)             ║"
          echo "║  → Engagement velocity boost (5 comments per video)            ║"
          echo "║  → Session watch time optimization                             ║"
          echo "║                                                                ║"
          echo "║  GOAL: Get videos to rank #1 on YouTube search!               ║"
          echo "╚════════════════════════════════════════════════════════════════╝"
          echo ""
          cd Scripts/YT
          python Search_Domination_Optimizer.py 2>&1 | tee ../../search_optimizer_output.log
          SEARCH_OPT_STATUS=$?
          echo "search_opt_status=$SEARCH_OPT_STATUS" >> $GITHUB_OUTPUT
          if [ $SEARCH_OPT_STATUS -eq 0 ]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "✅ Search Domination Optimizer completed successfully"
          else
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "❌ Search Domination Optimizer failed with exit code $SEARCH_OPT_STATUS"
          fi
        env:
          YOUTUBE_CHANNEL_ID: ${{ env.YOUTUBE_CHANNEL_ID }}
          YOUTUBE_REFRESH_TOKEN: ${{ env.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_CLIENT_ID: ${{ env.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ env.YOUTUBE_CLIENT_SECRET }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          MAX_OPTIMIZE: "5"
      - name: 📊 Search Optimizer Results Summary
        if: steps.config.outputs.run_optimizer == 'true'
        run: |
          if [ -f "search_optimizer_output.log" ]; then
            echo "📊 SEARCH OPTIMIZATION SUMMARY:"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            grep -E "Titles optimized:|Descriptions optimized:|Tags optimized:|Engagement comments:|QUOTA USED:" search_optimizer_output.log | tail -10 || echo "No summary found"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          fi
      - name: 🎯 Action 2/5 - Auto Optimizer (Fallback/Trending)
        id: optimizer
        if: steps.config.outputs.run_optimizer == 'true'
        continue-on-error: true
        run: |
          echo ""
          echo "╔════════════════════════════════════════════════════════════════╗"
          echo "║  🎯 AUTO OPTIMIZER (TRENDING KEYWORDS)                         ║"
          echo "║  → Update titles with trending keywords                        ║"
          echo "║  → Add trending hashtags to descriptions                       ║"
          echo "║  → Post engagement comments                                    ║"
          echo "║  → Create community posts                                      ║"
          echo "║  → Organize videos into playlists                              ║"
          echo "╚════════════════════════════════════════════════════════════════╝"
          echo ""
          cd Scripts/YT
          python Auto_Optimizer.py 2>&1 | tee ../../optimizer_output.log
          OPTIMIZER_STATUS=$?
          echo "optimizer_status=$OPTIMIZER_STATUS" >> $GITHUB_OUTPUT
          if [ $OPTIMIZER_STATUS -eq 0 ]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "✅ Optimizer completed successfully"
          else
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "❌ Optimizer failed with exit code $OPTIMIZER_STATUS"
          fi
        env:
          YOUTUBE_CHANNEL_ID: ${{ env.YOUTUBE_CHANNEL_ID }}
          YOUTUBE_REFRESH_TOKEN: ${{ env.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_CLIENT_ID: ${{ env.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ env.YOUTUBE_CLIENT_SECRET }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          MAX_UPDATES: "10"
      - name: 📊 Optimizer Results Summary
        if: steps.config.outputs.run_optimizer == 'true'
        run: |
          if [ -f "optimizer_output.log" ]; then
            echo "📊 OPTIMIZER SUMMARY:"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            grep -E "Titles updated:|Hashtags added:|Comments posted:|Videos organized:|COMPLETE" optimizer_output.log | tail -10 || echo "No summary found"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          fi
      # ========================================
      # ACTION 2: AUTO COMMENT REPLIER
      # ========================================
      - name: 💬 Action 2/4 - Auto Comment Replier
        id: comments
        if: steps.config.outputs.run_comments == 'true'
        continue-on-error: true
        run: |
          echo ""
          echo "╔════════════════════════════════════════════════════════════════╗"
          echo "║  💬 AUTO COMMENT REPLIER                                       ║"
          echo "║  → Find comments from last 24 hours                            ║"
          echo "║  → Reply with smart contextual responses                       ║"
          echo "║  → Heart top comments                                          ║"
          echo "╚════════════════════════════════════════════════════════════════╝"
          echo ""
          cd Scripts/YT
          python Auto_Comment_Replier.py 2>&1 | tee ../../comment_output.log
          COMMENT_STATUS=$?
          echo "comment_status=$COMMENT_STATUS" >> $GITHUB_OUTPUT
          if [ $COMMENT_STATUS -eq 0 ]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "✅ Comment replier completed successfully"
          else
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "❌ Comment replier failed with exit code $COMMENT_STATUS"
          fi
        env:
          YOUTUBE_CHANNEL_ID: ${{ env.YOUTUBE_CHANNEL_ID }}
          YOUTUBE_REFRESH_TOKEN: ${{ env.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_CLIENT_ID: ${{ env.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ env.YOUTUBE_CLIENT_SECRET }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          MAX_REPLIES: "20"
      - name: 📊 Comment Replier Results Summary
        if: steps.config.outputs.run_comments == 'true'
        run: |
          if [ -f "comment_output.log" ]; then
            echo "📊 COMMENT REPLIER SUMMARY:"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            grep -E "Replied to:|Hearted:|COMPLETE" comment_output.log | tail -10 || echo "No summary found"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          fi
      # ========================================
      # ACTION 3: AUTO CROSS PROMOTER
      # ========================================
      - name: 🔗 Action 3/4 - Auto Cross Promoter
        id: cross_promo
        if: steps.config.outputs.run_cross_promo == 'true'
        continue-on-error: true
        run: |
          echo ""
          echo "╔════════════════════════════════════════════════════════════════╗"
          echo "║  🔗 AUTO CROSS PROMOTER                                        ║"
          echo "║  → Find best videos from each channel                          ║"
          echo "║  → Cross-promote via comments                                  ║"
          echo "║  → Update descriptions with network links                      ║"
          echo "║  → Create network best-of playlist                             ║"
          echo "╚════════════════════════════════════════════════════════════════╝"
          echo ""
          cd Scripts/YT
          python Auto_Cross_Promoter.py 2>&1 | tee ../../cross_promo_output.log
          CROSS_STATUS=$?
          echo "cross_status=$CROSS_STATUS" >> $GITHUB_OUTPUT
          if [ $CROSS_STATUS -eq 0 ]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "✅ Cross promoter completed successfully"
          else
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "❌ Cross promoter failed with exit code $CROSS_STATUS"
          fi
        env:
          YOUTUBE_CHANNEL_ID: ${{ env.YOUTUBE_CHANNEL_ID }}
          YOUTUBE_REFRESH_TOKEN: ${{ env.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_CLIENT_ID: ${{ env.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ env.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_CHANNEL_ID_1: ${{ secrets.YOUTUBE_CHANNEL_ID }}
          YOUTUBE_1_REFRESH_TOKEN: ${{ env.YOUTUBE_1_REFRESH_TOKEN }}
          YOUTUBE_1_CLIENT_ID: ${{ env.YOUTUBE_1_CLIENT_ID }}
          YOUTUBE_1_CLIENT_SECRET: ${{ env.YOUTUBE_1_CLIENT_SECRET }}
          YOUTUBE_CHANNEL_ID_2: ${{ secrets.YOUTUBE_CHANNEL_ID_2 }}
          YOUTUBE_2_REFRESH_TOKEN: ${{ env.YOUTUBE_2_REFRESH_TOKEN }}
          YOUTUBE_2_CLIENT_ID: ${{ env.YOUTUBE_2_CLIENT_ID }}
          YOUTUBE_2_CLIENT_SECRET: ${{ env.YOUTUBE_2_CLIENT_SECRET }}
          YOUTUBE_3_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID_3 }}
          YOUTUBE_3_REFRESH_TOKEN: ${{ env.YOUTUBE_3_REFRESH_TOKEN }}
          YOUTUBE_3_CLIENT_ID: ${{ env.YOUTUBE_3_CLIENT_ID }}
          YOUTUBE_3_CLIENT_SECRET: ${{ env.YOUTUBE_3_CLIENT_SECRET }}
          YOUTUBE_4_CHANNEL_ID: ${{ secrets.KIAASA_CHANNEL_ID }}
          YOUTUBE_4_REFRESH_TOKEN: ${{ env.YOUTUBE_4_REFRESH_TOKEN }}
          YOUTUBE_4_CLIENT_ID: ${{ env.YOUTUBE_4_CLIENT_ID }}
          YOUTUBE_4_CLIENT_SECRET: ${{ env.YOUTUBE_4_CLIENT_SECRET }}
          KIAASA_CHANNEL_ID: ${{ secrets.KIAASA_CHANNEL_ID }}
          KIAASA_REFRESH_TOKEN: ${{ env.YOUTUBE_4_REFRESH_TOKEN }}
          KIAASA_CLIENT_ID: ${{ env.YOUTUBE_4_CLIENT_ID }}
          KIAASA_CLIENT_SECRET: ${{ env.YOUTUBE_4_CLIENT_SECRET }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
      - name: 📊 Cross Promoter Results Summary
        if: steps.config.outputs.run_cross_promo == 'true'
        run: |
          if [ -f "cross_promo_output.log" ]; then
            echo "📊 CROSS PROMOTER SUMMARY:"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            grep -E "Best videos found:|Cross-promo comments:|Descriptions updated:|Network playlist:|COMPLETE" cross_promo_output.log | tail -10 || echo "No summary found"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          fi
      # ========================================
      # ACTION 4: ANALYTICS & TRENDING
      # ========================================
      - name: 📈 Action 4/4 - Analytics & Trending Topics
        id: analytics
        if: steps.config.outputs.run_analytics == 'true'
        continue-on-error: true
        run: |
          echo ""
          echo "╔════════════════════════════════════════════════════════════════╗"
          echo "║  📈 ANALYTICS & TRENDING                                       ║"
          echo "║  → Track video performance                                     ║"
          echo "║  → Identify trending topics                                    ║"
          echo "║  → Generate insights                                           ║"
          echo "╚════════════════════════════════════════════════════════════════╝"
          echo ""
          cd Scripts/YT
          # Run analytics tracker
          echo "📊 Running Analytics Tracker..."
          python Analytics_Tracker.py 2>&1 | tee ../../analytics_output.log
          ANALYTICS_STATUS=$?
          # Run trending topics finder
          echo ""
          echo "🔥 Running Trending Topics Finder..."
          python Trending_Topics_Finder.py 2>&1 | tee ../../trending_output.log
          TRENDING_STATUS=$?
          if [ $ANALYTICS_STATUS -eq 0 ] && [ $TRENDING_STATUS -eq 0 ]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "✅ Analytics & trending completed successfully"
          else
            echo "status=partial" >> $GITHUB_OUTPUT
            echo "⚠️  Analytics completed with some issues"
          fi
        env:
          YOUTUBE_CHANNEL_ID: ${{ env.YOUTUBE_CHANNEL_ID }}
          YOUTUBE_REFRESH_TOKEN: ${{ env.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_CLIENT_ID: ${{ env.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ env.YOUTUBE_CLIENT_SECRET }}
      - name: 📊 Analytics Results Summary
        if: steps.config.outputs.run_analytics == 'true'
        run: |
          echo "📊 ANALYTICS SUMMARY:"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          if [ -f "analytics_output.log" ]; then
            grep -E "Total views:|Average views:|Top.*tags:|Best upload hours:" analytics_output.log | head -10 || echo "Analytics data processing..."
          fi
          if [ -f "trending_output.log" ]; then
            grep -E "Videos analyzed:|TOP.*KEYWORDS:|CONTENT IDEAS:" trending_output.log | head -10 || echo "Trending data processing..."
          fi
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      # ========================================
      # RESULTS & REPORTING
      # ========================================
      - name: 📊 Generate Final Summary Report
        if: always()
        run: |
          echo ""
          echo "╔════════════════════════════════════════════════════════════════╗"
          echo "║                                                                ║"
          echo "║           📊 FINAL EXECUTION SUMMARY                           ║"
          echo "║                                                                ║"
          echo "╚════════════════════════════════════════════════════════════════╝"
          echo ""
          echo "⏰ Completed: $(date -u +'%Y-%m-%d %H:%M:%S') UTC"
          echo ""
          echo "✅ Actions Status:"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          # Optimizer
          if [ "${{ steps.config.outputs.run_optimizer }}" == "true" ]; then
            if [ "${{ steps.optimizer.outputs.status }}" == "success" ]; then
              echo "  🎯 Optimizer:       ✅ SUCCESS"
            else
              echo "  🎯 Optimizer:       ❌ FAILED"
            fi
          else
            echo "  🎯 Optimizer:       ⏭️  SKIPPED"
          fi
          # Comments
          if [ "${{ steps.config.outputs.run_comments }}" == "true" ]; then
            if [ "${{ steps.comments.outputs.status }}" == "success" ]; then
              echo "  💬 Comment Replier: ✅ SUCCESS"
            else
              echo "  💬 Comment Replier: ❌ FAILED"
            fi
          else
            echo "  💬 Comment Replier: ⏭️  SKIPPED"
          fi
          # Cross Promo
          if [ "${{ steps.config.outputs.run_cross_promo }}" == "true" ]; then
            if [ "${{ steps.cross_promo.outputs.status }}" == "success" ]; then
              echo "  🔗 Cross Promoter:  ✅ SUCCESS"
            else
              echo "  🔗 Cross Promoter:  ❌ FAILED"
            fi
          else
            echo "  🔗 Cross Promoter:  ⏭️  SKIPPED"
          fi
          # Analytics
          if [ "${{ steps.config.outputs.run_analytics }}" == "true" ]; then
            if [ "${{ steps.analytics.outputs.status }}" == "success" ]; then
              echo "  📈 Analytics:       ✅ SUCCESS"
            elif [ "${{ steps.analytics.outputs.status }}" == "partial" ]; then
              echo "  📈 Analytics:       ⚠️  PARTIAL"
            else
              echo "  📈 Analytics:       ❌ FAILED"
            fi
          else
            echo "  📈 Analytics:       ⏭️  SKIPPED"
          fi
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          # Show quick stats
          echo "📈 Quick Stats:"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          if [ -f "optimizer_output.log" ]; then
            grep -oP "Titles updated: \K\d+" optimizer_output.log | tail -1 | xargs -I {} echo "  Titles updated: {}"
            grep -oP "Hashtags added: \K\d+" optimizer_output.log | tail -1 | xargs -I {} echo "  Hashtags added: {}"
            grep -oP "Comments posted: \K\d+" optimizer_output.log | tail -1 | xargs -I {} echo "  Comments posted: {}"
          fi
          if [ -f "comment_output.log" ]; then
            grep -oP "Replied to: \K\d+" comment_output.log | tail -1 | xargs -I {} echo "  Replies sent: {}"
            grep -oP "Hearted: \K\d+" comment_output.log | tail -1 | xargs -I {} echo "  Comments hearted: {}"
          fi
          if [ -f "cross_promo_output.log" ]; then
            grep -oP "Cross-promo comments posted: \K\d+" cross_promo_output.log | tail -1 | xargs -I {} echo "  Cross-promos: {}"
          fi
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          # Check for errors
          ERROR_COUNT=0
          [ "${{ steps.optimizer.outputs.status }}" == "failed" ] && ERROR_COUNT=$((ERROR_COUNT + 1))
          [ "${{ steps.comments.outputs.status }}" == "failed" ] && ERROR_COUNT=$((ERROR_COUNT + 1))
          [ "${{ steps.cross_promo.outputs.status }}" == "failed" ] && ERROR_COUNT=$((ERROR_COUNT + 1))
          if [ $ERROR_COUNT -gt 0 ]; then
            echo "⚠️  $ERROR_COUNT action(s) failed - check logs above for details"
          else
            echo "✅ All actions completed successfully!"
          fi
          echo ""
      - name: 📄 Create GitHub Summary
        if: always()
        run: |
          echo "# 🎯 YouTube Master Automation - Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date -u +'%Y-%m-%d %H:%M:%S') UTC" >> $GITHUB_STEP_SUMMARY
          echo "**Mode:** ${{ github.event.inputs.action_mode || 'Scheduled' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Dry Run:** ${{ github.event.inputs.dry_run || 'false' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📊 Actions Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Action | Status | Details |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|---------|" >> $GITHUB_STEP_SUMMARY
          # Add each action's status
          if [ "${{ steps.config.outputs.run_optimizer }}" == "true" ]; then
            STATUS="${{ steps.optimizer.outputs.status }}"
            ICON=$([ "$STATUS" == "success" ] && echo "✅" || echo "❌")
            echo "| 🎯 Optimizer | $ICON $STATUS | Titles, hashtags, playlists |" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ steps.config.outputs.run_comments }}" == "true" ]; then
            STATUS="${{ steps.comments.outputs.status }}"
            ICON=$([ "$STATUS" == "success" ] && echo "✅" || echo "❌")
            echo "| 💬 Comment Replier | $ICON $STATUS | Auto-replies, engagement |" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ steps.config.outputs.run_cross_promo }}" == "true" ]; then
            STATUS="${{ steps.cross_promo.outputs.status }}"
            ICON=$([ "$STATUS" == "success" ] && echo "✅" || echo "❌")
            echo "| 🔗 Cross Promoter | $ICON $STATUS | Network promotion |" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ steps.config.outputs.run_analytics }}" == "true" ]; then
            STATUS="${{ steps.analytics.outputs.status }}"
            ICON=$([ "$STATUS" == "success" ] && echo "✅" || [ "$STATUS" == "partial" ] && echo "⚠️" || echo "❌")
            echo "| 📈 Analytics | $ICON $STATUS | Performance tracking |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📦 Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download detailed logs and reports from the artifacts section below." >> $GITHUB_STEP_SUMMARY
      - name: 📦 Upload All Logs & Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: youtube-automation-logs-${{ github.run_number }}
          path: |
            optimizer_output.log
            comment_output.log
            cross_promo_output.log
            analytics_output.log
            trending_output.log
            Scripts/YT/auto_optimizer_actions.json
            Scripts/YT/replied_comments.txt
            Scripts/YT/cross_promo_log.json
            Scripts/YT/community_posts_queue.txt
            Scripts/YT/analytics_history.json
            Scripts/YT/performance_report.json
            Scripts/YT/trending_topics.json
          retention-days: 30
          if-no-files-found: warn
      # ========================================
      # FINAL STATUS
      # ========================================
      - name: 🎉 Success Notification
        if: success()
        run: |
          echo ""
          echo "╔════════════════════════════════════════════════════════════════╗"
          echo "║                                                                ║"
          echo "║              ✅ WORKFLOW COMPLETED SUCCESSFULLY                ║"
          echo "║                                                                ║"
          echo "╚════════════════════════════════════════════════════════════════╝"
          echo ""
          if [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
            echo "🧪 DRY RUN MODE - No actual changes were made"
            echo "   Review the logs above to see what would happen"
            echo "   Disable dry run to apply changes for real"
          else
            echo "✅ Your YouTube channel has been optimized!"
            echo "   → Videos updated with trending keywords"
            echo "   → Comments replied to automatically"
            echo "   → Channels cross-promoting each other"
            echo "   → Analytics tracking performance"
          fi
          echo ""
          echo "📥 Download artifacts above for detailed logs"
          echo ""
      - name: ❌ Failure Notification
        if: failure()
        run: |
          echo ""
          echo "╔════════════════════════════════════════════════════════════════╗"
          echo "║                                                                ║"
          echo "║              ❌ WORKFLOW FAILED                                ║"
          echo "║                                                                ║"
          echo "╚════════════════════════════════════════════════════════════════╝"
          echo ""
          echo "⚠️  One or more actions failed. Common issues:"
          echo ""
          echo "1. ❌ Invalid YouTube credentials"
          echo "   → Check GitHub Secrets are set correctly"
          echo "   → Verify YT_Tokens files exist and are valid"
          echo ""
          echo "2. ❌ API quota exceeded"
          echo "   → YouTube allows 10,000 units/day"
          echo "   → Wait 24 hours and try again"
          echo ""
          echo "3. ❌ No videos found"
          echo "   → Check YOUTUBE_CHANNEL_ID is correct"
          echo "   → Verify channel has recent videos"
          echo ""
          echo "4. ❌ Permission issues"
          echo "   → Ensure OAuth scopes include comments, playlists"
          echo "   → Re-authorize if needed"
          echo ""
          echo "📥 Download artifacts above to see detailed error logs"
          echo "🐛 Open an issue on GitHub if you need help debugging"
          echo ""
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # NOTIFICATION: Runs when workflow is skipped
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
