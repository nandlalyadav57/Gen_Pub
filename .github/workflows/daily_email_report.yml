name: 📊 Daily Health Report - Workflow Status Email

on:
  # Send daily report at 9 PM IST (3:30 PM UTC)
  schedule:
    - cron: "30 15 * * *"

  # Manual trigger (removed auto-trigger after workflows to reduce unnecessary runs)
  workflow_dispatch:
    inputs:
      report_type:
        description: 'Report Type'
        required: false
        default: 'daily'
        type: choice
        options:
          - daily
          - workflow
          - weekly

jobs:
  send-report:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv google-api-python-client google-auth google-auth-oauthlib

      - name: 🔧 CSV Master Health Check
        id: csv_validation
        continue-on-error: true
        run: |
          echo "🔧 Running CSV Master Health Check..."
          python Scripts/csv_master_fixer.py --daily-check > csv_health_report.txt 2>&1

          # Save exit code for report
          echo "CSV_HEALTH_EXIT=$?" >> $GITHUB_ENV

          # Display summary
          echo ""
          echo "CSV health check complete. Results will be included in email report."
          cat csv_health_report.txt

      - name: 🔐 Validate All Tokens (YT/FB/IG)
        id: token_validation
        continue-on-error: true
        run: |
          echo "🔐 Running token health validation..."
          python Scripts/validate_all_tokens.py > token_validation_report.txt 2>&1

          # Save exit code for report
          echo "VALIDATION_EXIT=$?" >> $GITHUB_ENV

          # Display summary
          echo ""
          echo "Token validation complete. Results will be included in email report."
          cat token_validation_report.txt

      - name: 📊 Generate and Send Report
        env:
          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          # Enhanced HA Architecture: PRIMARY + BACKUP API Keys
          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

          # Gemini Keys (PRIMARY tier with exponential backoff)
          GEMINI_API_KEY_PRIMARY: ${{ secrets.GEMINI_API_KEY_PRIMARY }}
          GEMINI_API_KEY_PRIMARY_2: ${{ secrets.GEMINI_API_KEY_PRIMARY_2 }}
          GEMINI_API_KEY_PRIMARY_3: ${{ secrets.GEMINI_API_KEY_PRIMARY_3 }}
          GEMINI_API_KEY_PRIMARY_4: ${{ secrets.GEMINI_API_KEY_PRIMARY_4 }}
          GEMINI_API_KEY_PRIMARY_5: ${{ secrets.GEMINI_API_KEY_PRIMARY_5 }}

          # Gemini Keys (BACKUP tier)
          GEMINI_API_KEY_BACKUP: ${{ secrets.GEMINI_API_KEY_BACKUP }}
          GEMINI_API_KEY_BACKUP_2: ${{ secrets.GEMINI_API_KEY_BACKUP_2 }}
          GEMINI_API_KEY_BACKUP_3: ${{ secrets.GEMINI_API_KEY_BACKUP_3 }}

          # OpenAI Keys (PRIMARY + BACKUP)
          OPENAI_API_KEY_PRIMARY: ${{ secrets.OPENAI_API_KEY_PRIMARY }}
          OPENAI_API_KEY_BACKUP: ${{ secrets.OPENAI_API_KEY_BACKUP }}

          # Note: Enhanced HA keys are auto-discovered by api_key_manager_enhanced.py

          # SMTP Configuration (for sending emails)
          SMTP_SERVER: ${{ secrets.SMTP_SERVER || 'smtp.gmail.com' }}
          SMTP_PORT: ${{ secrets.SMTP_PORT || '587' }}
          SMTP_USER: ${{ secrets.SMTP_USER || 'nandlalyadav57@gmail.com' }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD || secrets.GMAIL_APP_PASSWORD }}

          # YouTube API Configuration (for analytics)
          YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}

          # GitHub Tokens for API access
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_PAT: ${{ secrets.GITHUB_PAT }}  # For cross-org access (sslny57/shorts_upload_automation)

        run: |
          cd Scripts
          REPORT_TYPE="${{ github.event.inputs.report_type || 'daily' }}"
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            REPORT_TYPE="workflow"
          fi
          python daily_email_report.py --${REPORT_TYPE}

      - name: 📤 Upload Report as Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: intelligence-report-${{ github.run_number }}
          path: Scripts/*intelligence_report*.html
          retention-days: 30

      - name: 📝 Summary
        if: always()
        run: |
          echo "### 📊 Automation Intelligence Briefing" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Report generated and sent to: **nandlalyadav57@yahoo.in**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📅 Includes: 7-Day Predictive Calendar + Festival Detection" >> $GITHUB_STEP_SUMMARY
          echo "🔑 API Health: All 28 provider slots monitored" >> $GITHUB_STEP_SUMMARY
          echo "🚨 Workflow Diagnostics: Recent failure tracking" >> $GITHUB_STEP_SUMMARY
          echo "🔐 Token Health: YT (6) + FB (7) + IG (3) = 16 credentials validated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Report Type: **${{ github.event.inputs.report_type || 'daily' }}**" >> $GITHUB_STEP_SUMMARY
          echo "Generated: **$(date)**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Add token validation summary if available
          if [ -f token_validation_report.txt ]; then
            echo "### 🔐 Token Validation Status" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            tail -20 token_validation_report.txt >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          fi
