# This workflow has automatic failover between Main and DR repositories
# Main repo (ny5457/General): Runs by default
# DR repo (nandlalyadav57/General): Activates when Main runs low on minutes
# Force re-registration: 2026-05-27

name: 👗 Kiaasa Pune Dhanori - End-to-End Automation

on:
  workflow_dispatch:
    inputs:
      platform:
        description: '📱 Platform Selection'
        required: true
        type: choice
        options:
          - '🌐 All Platforms (Facebook + Instagram)'
          - '📘 Facebook Only'
          - '📸 Instagram Only'
        default: '🌐 All Platforms (Facebook + Instagram)'

      dry_run:
        description: "dry_run (true/false)"
        required: false
        default: "false"

      mode:
        description: '⚙️ Operation Mode'
        required: false
        type: choice
        options:
          - 'Auto (posting + curation as scheduled)'
          - 'Posting Only'
          - 'Curation Only'
        default: 'Auto (posting + curation as scheduled)'

  schedule:
    # VIRAL-OPTIMIZED FASHION POSTING SCHEDULE (Global + India peak times)
    # Strategy: Hit fashion-conscious women during decision-making hours
    - cron: "0 4 * * *"      # 9:30 AM IST = Morning coffee scroll (India primary)
    - cron: "0 9 * * *"      # 2:30 PM IST = Lunch break shopping research (India)
    - cron: "0 13 * * *"     # 6:30 PM IST = Post-work fashion browsing (India peak)
    # Biweekly media curation (1st and 15th of month)
    - cron: "0 3 1,15 * *"   # 3:00 AM UTC on 1st and 15th - Content curation

permissions:
  contents: read

jobs:
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # GATEKEEPER: Temporarily disabled - GitHub deprecated user billing API
  # GitHub only allows organization billing checks, not personal accounts
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # gatekeeper:
  #   uses: ./.github/workflows/gatekeeper.yml
  #   with:
  #     repo_mode: ${{ github.repository == 'ny5457/General' && 'MAIN' || 'DR' }}
  #   secrets:
  #     main_billing_token: ${{ secrets.MAIN_BILLING_TOKEN }}
  #     main_repo_owner: ${{ secrets.MAIN_REPO_OWNER }}

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # MAIN JOB: post_Kiaasa
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  post_Kiaasa:
    # needs: gatekeeper
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      # DETECT OPERATION MODE: Posting vs Curation
      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      - name: 🎯 Detect Operation Mode
        id: detect_mode
        run: |
          HOUR=$(date -u +%H)
          DAY=$(date -u +%d)
          MODE="${{ github.event.inputs.mode }}"

          # Manual trigger with explicit mode
          if [ -n "$MODE" ]; then
            echo "🎛️  Manual mode: $MODE"
            if [[ "$MODE" == *"Curation"* ]]; then
              echo "run_curation=true" >> $GITHUB_OUTPUT
              echo "run_posting=false" >> $GITHUB_OUTPUT
            else
              echo "run_curation=false" >> $GITHUB_OUTPUT
              echo "run_posting=true" >> $GITHUB_OUTPUT
            fi
            exit 0
          fi

          # Scheduled run - detect based on time
          if [ "$HOUR" == "03" ] && ([ "$DAY" == "01" ] || [ "$DAY" == "15" ]); then
            echo "🎨 CURATION MODE: Biweekly content refresh (1st or 15th)"
            echo "run_curation=true" >> $GITHUB_OUTPUT
            echo "run_posting=false" >> $GITHUB_OUTPUT
          else
            echo "📱 POSTING MODE: Daily content distribution"
            echo "run_curation=false" >> $GITHUB_OUTPUT
            echo "run_posting=true" >> $GITHUB_OUTPUT
          fi

      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      # SKIP-FAST PRE-CHECK: Exit early if cooldown active (saves ~1min)
      # Only runs for posting mode
      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      - name: 🚦 Pre-check Cooldown (Skip-Fast)
        if: steps.detect_mode.outputs.run_posting == 'true'
        id: precheck
        run: |
          HISTORY_FILE="Scripts/FB/kiaasa_content_history.json"

          # If no history, proceed
          if [ ! -f "$HISTORY_FILE" ]; then
            echo "ℹ️  No history file - first run, proceeding..."
            echo "should_proceed=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Extract last post date and calculate hours since
          LAST_POST=$(jq -r '.posts[-1].date // empty' "$HISTORY_FILE")

          if [ -z "$LAST_POST" ]; then
            echo "ℹ️  No posts in history - proceeding..."
            echo "should_proceed=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Calculate hours since last post
          LAST_EPOCH=$(date -d "$LAST_POST" +%s 2>/dev/null || echo 0)
          NOW_EPOCH=$(date +%s)
          HOURS_SINCE=$(( ($NOW_EPOCH - $LAST_EPOCH) / 3600 ))

          echo "📅 Last post: $LAST_POST"
          echo "⏱️  Hours since: $HOURS_SINCE"

          # Cooldown threshold: 4 hours (3 posts per day for fashion content)
          COOLDOWN_HOURS=4
          if [ "$HOURS_SINCE" -lt "$COOLDOWN_HOURS" ]; then
            HOURS_REMAINING=$(( $COOLDOWN_HOURS - $HOURS_SINCE ))
            echo "⏸️  COOLDOWN ACTIVE - skipping to save GitHub Actions minutes"
            echo "📊 Wait $HOURS_REMAINING more hour(s) before next post"
            echo "💡 Strategy: 3 posts per day for optimal engagement"
            echo "should_proceed=false" >> $GITHUB_OUTPUT
            exit 0
          else
            echo "✅ Cooldown passed ($HOURS_SINCE hours) - proceeding with post"
            echo "should_proceed=true" >> $GITHUB_OUTPUT
          fi
      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

      - name: Setup Python
        if: steps.detect_mode.outputs.run_posting == 'true' && steps.precheck.outputs.should_proceed == 'true' || steps.detect_mode.outputs.run_curation == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install System Dependencies (FFmpeg + Pillow build deps)
        if: steps.detect_mode.outputs.run_posting == 'true' && steps.precheck.outputs.should_proceed == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libjpeg-dev zlib1g-dev

      - name: Install Python dependencies
        if: steps.precheck.outputs.should_proceed == 'true'
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install requests python-dotenv google-generativeai openai gTTS
          # Install MoviePy for video audio mixing + compatible Pillow version
          python3 -m pip install "Pillow==9.5.0" "moviepy==1.0.3" "imageio[ffmpeg]"
          # Install numpy + scipy for synthetic audio generation
          python3 -m pip install numpy scipy

      - name: 🎵 Show Audio Recommendation
        if: steps.precheck.outputs.should_proceed == 'true'
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🎵 TRENDING AUDIO FOR THIS POST"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          python3 Kiaasa_Enhanced.py --daily | head -20 || echo "Audio system check complete"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Verify Facebook token file
        if: steps.precheck.outputs.should_proceed == 'true'
        run: |
          FB_FILE="Scripts/YT/Secrets_Sessions/Fb_Tokens.txt"
          if [ ! -f "$FB_FILE" ]; then
            echo "Error: Fb_Tokens.txt not found!"
            exit 1
          else
            echo "Fb_Tokens.txt exists ✅"
          fi

      - name: Load Facebook token for Kiaasa
        if: steps.precheck.outputs.should_proceed == 'true'
        id: load_fb
        run: |
          FB_FILE="Scripts/YT/Secrets_Sessions/Fb_Tokens.txt"
          PAGE_ID=$(awk '/Kiaasa/{getline; print $NF}' "$FB_FILE")
          PAGE_TOKEN=$(awk '/Kiaasa/{getline; getline; print $NF}' "$FB_FILE")
          echo "Loaded Kiaasa page ID and token ✅"
          echo "FB_PAGE_ID=$PAGE_ID" >> $GITHUB_ENV
          echo "FB_PAGE_TOKEN=$PAGE_TOKEN" >> $GITHUB_ENV

      - name: Load YouTube OAuth credentials (YT_Tokens4 - Kiaasa)
        if: steps.precheck.outputs.should_proceed == 'true'
        id: load_yt
        run: |
          echo "🎬 Loading YouTube Token 4 (Kiaasa Pune channel)..."
          YT_FILE4="Scripts/YT/Secrets_Sessions/YT_Tokens4.txt"

          if [ -f "$YT_FILE4" ]; then
            YOUTUBE_REFRESH_TOKEN=$(grep 'refresh_token' "$YT_FILE4" | awk -F'=' '{print $2}' | xargs)
            YOUTUBE_CLIENT_ID=$(grep 'client_id' "$YT_FILE4" | awk -F'=' '{print $2}' | xargs)
            YOUTUBE_CLIENT_SECRET=$(grep 'client_secret' "$YT_FILE4" | awk -F'=' '{print $2}' | xargs)
            echo "✅ Loaded YouTube credentials from file: YT_Tokens4.txt"
          else
            YOUTUBE_REFRESH_TOKEN="${{ secrets.YOUTUBE_4_REFRESH_TOKEN }}"
            YOUTUBE_CLIENT_ID="${{ secrets.YOUTUBE_4_CLIENT_ID }}"
            YOUTUBE_CLIENT_SECRET="${{ secrets.YOUTUBE_4_CLIENT_SECRET }}"
            echo "⚠️  File not found, using GitHub secrets (fallback)"
          fi

          echo "YOUTUBE_4_REFRESH_TOKEN=$YOUTUBE_REFRESH_TOKEN" >> $GITHUB_ENV
          echo "YOUTUBE_4_CLIENT_ID=$YOUTUBE_CLIENT_ID" >> $GITHUB_ENV
          echo "YOUTUBE_4_CLIENT_SECRET=$YOUTUBE_CLIENT_SECRET" >> $GITHUB_ENV
          echo "✅ YouTube credentials exported to environment"

      - name: Set Platform Configuration
        if: steps.precheck.outputs.should_proceed == 'true'
        run: |
          PLATFORM="${{ github.event.inputs.platform }}"

          # Default to all platforms if triggered by schedule
          if [ -z "$PLATFORM" ]; then
            PLATFORM="🌐 All Platforms (Facebook + Instagram)"
          fi

          echo "📱 Selected Platform: $PLATFORM"

          # Configure platform flags
          case "$PLATFORM" in
            *"All Platforms"*)
              echo "ENABLE_FACEBOOK=true" >> $GITHUB_ENV
              echo "ENABLE_INSTAGRAM_CROSSPOST=true" >> $GITHUB_ENV
              echo "🌐 Posting to ALL platforms"
              ;;
            *"Facebook Only"*)
              echo "ENABLE_FACEBOOK=true" >> $GITHUB_ENV
              echo "ENABLE_INSTAGRAM_CROSSPOST=false" >> $GITHUB_ENV
              echo "📘 Posting to FACEBOOK only"
              ;;
            *"Instagram Only"*)
              echo "ENABLE_FACEBOOK=false" >> $GITHUB_ENV
              echo "ENABLE_INSTAGRAM_CROSSPOST=true" >> $GITHUB_ENV
              echo "📸 Posting to INSTAGRAM only"
              ;;
          esac

      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      # BIWEEKLY CONTENT CURATION (1st and 15th of month)
      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      - name: 🎨 Install Curation Dependencies
        if: steps.detect_mode.outputs.run_curation == 'true'
        run: |
          echo "📦 Installing curation packages..."
          pip install google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client requests pydantic google-generativeai openai

      - name: 🎵 Curate Kiaasa Sounds (AI-filtered)
        if: steps.detect_mode.outputs.run_curation == 'true'
        id: curate_sounds
        env:
          GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
          GDRIVE_REFRESH_TOKEN: ${{ secrets.GDRIVE_REFRESH_TOKEN }}
          GDRIVE_SERVICE_ACCOUNT: ${{ secrets.GDRIVE_SERVICE_ACCOUNT }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          ROOT_DRIVE_FOLDER_ID: ${{ secrets.ROOT_DRIVE_FOLDER_ID }}
        run: |
          cd Scripts/FB
          echo "🎵 Starting sound curation..."
          python3 ai_sound_curator.py --source all --count 5 --threshold 8 2>&1 | tee ../../sound_curation.log
          SOUND_EXIT=$?
          echo "sound_status=$SOUND_EXIT" >> $GITHUB_OUTPUT
          if [ $SOUND_EXIT -eq 0 ]; then
            echo "✅ Sound curation successful"
          else
            echo "⚠️ Sound curation completed with warnings"
          fi

      - name: 🎬 Curate Kiaasa Videos (AI-filtered)
        if: steps.detect_mode.outputs.run_curation == 'true'
        id: curate_videos
        env:
          GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
          GDRIVE_REFRESH_TOKEN: ${{ secrets.GDRIVE_REFRESH_TOKEN }}
          GDRIVE_SERVICE_ACCOUNT: ${{ secrets.GDRIVE_SERVICE_ACCOUNT }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          ROOT_DRIVE_FOLDER_ID: ${{ secrets.ROOT_DRIVE_FOLDER_ID }}
        run: |
          cd Scripts/FB
          echo "🎬 Starting video curation..."
          python3 ai_video_curator.py --source ethnic_wear --count 3 --threshold 8 2>&1 | tee ../../video_curation.log
          VIDEO_EXIT=$?
          echo "video_status=$VIDEO_EXIT" >> $GITHUB_OUTPUT
          if [ $VIDEO_EXIT -eq 0 ]; then
            echo "✅ Video curation successful"
          else
            echo "⚠️ Video curation completed with warnings"
          fi

      - name: 📊 Curation Summary Report
        if: steps.detect_mode.outputs.run_curation == 'true' && always()
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🎨 BIWEEKLY CURATION SUMMARY"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "Sound Curation: $([ '${{ steps.curate_sounds.outputs.sound_status }}' == '0' ] && echo '✅ SUCCESS' || echo '⚠️ WARNING')"
          echo "Video Curation: $([ '${{ steps.curate_videos.outputs.video_status }}' == '0' ] && echo '✅ SUCCESS' || echo '⚠️ WARNING')"
          echo ""
          echo "📝 Detailed logs:"
          echo ""
          echo "--- SOUND CURATION ---"
          tail -20 sound_curation.log 2>/dev/null || echo "No sound log found"
          echo ""
          echo "--- VIDEO CURATION ---"
          tail -20 video_curation.log 2>/dev/null || echo "No video log found"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

      - name: Generate and Post Kiaasa Fashion Content
        if: steps.detect_mode.outputs.run_posting == 'true' && steps.precheck.outputs.should_proceed == 'true'
        run: python3 Scripts/FB/Kiaasa.py
        env:
          KIAASA_PAGE_ID: ${{ env.FB_PAGE_ID }}
          KIAASA_PAGE_TOKEN: ${{ env.FB_PAGE_TOKEN }}
          FB_PAGE_ID_7: ${{ env.FB_PAGE_ID }}
          FB_PAGE_TOKEN_7: ${{ env.FB_PAGE_TOKEN }}

          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          # Enhanced HA Architecture: PRIMARY + BACKUP API Keys
          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━



          # Gemini Keys (PRIMARY tier with exponential backoff)
          GEMINI_API_KEY_PRIMARY: ${{ secrets.GEMINI_API_KEY_PRIMARY }}
          GEMINI_API_KEY_PRIMARY_2: ${{ secrets.GEMINI_API_KEY_PRIMARY_2 }}
          GEMINI_API_KEY_PRIMARY_3: ${{ secrets.GEMINI_API_KEY_PRIMARY_3 }}
          GEMINI_API_KEY_PRIMARY_4: ${{ secrets.GEMINI_API_KEY_PRIMARY_4 }}
          GEMINI_API_KEY_PRIMARY_5: ${{ secrets.GEMINI_API_KEY_PRIMARY_5 }}

          # Gemini Keys (BACKUP tier)
          GEMINI_API_KEY_BACKUP: ${{ secrets.GEMINI_API_KEY_BACKUP }}
          GEMINI_API_KEY_BACKUP_2: ${{ secrets.GEMINI_API_KEY_BACKUP_2 }}
          GEMINI_API_KEY_BACKUP_3: ${{ secrets.GEMINI_API_KEY_BACKUP_3 }}

          # OpenAI Keys (PRIMARY + BACKUP)
          OPENAI_API_KEY_PRIMARY: ${{ secrets.OPENAI_API_KEY_PRIMARY }}
          OPENAI_API_KEY_BACKUP: ${{ secrets.OPENAI_API_KEY_BACKUP }}

          # Pexels API (for fashion images/videos)
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}

          # Instagram Cross-Posting Configuration
          KIAASA_INSTAGRAM_ID: ${{ secrets.KIAASA_INSTAGRAM_ID }}
          INSTAGRAM_BUSINESS_ID: ${{ secrets.KIAASA_INSTAGRAM_ID }}
          ENABLE_INSTAGRAM_CROSSPOST: ${{ env.ENABLE_INSTAGRAM_CROSSPOST }}
          ENABLE_FACEBOOK: ${{ env.ENABLE_FACEBOOK }}

          # YouTube Upload Configuration (Kiaasa Pune channel - YT_Tokens4)
          YOUTUBE_4_REFRESH_TOKEN: ${{ secrets.YOUTUBE_4_REFRESH_TOKEN }}
          YOUTUBE_4_CLIENT_ID: ${{ secrets.YOUTUBE_4_CLIENT_ID }}
          YOUTUBE_4_CLIENT_SECRET: ${{ secrets.YOUTUBE_4_CLIENT_SECRET }}
          ENABLE_YOUTUBE_UPLOAD: true

          # Note: Enhanced HA keys are auto-discovered by api_key_manager_enhanced.py

          DRY_RUN: ${{ github.event.inputs.dry_run }}

      - name: 📤 Upload Curation Logs
        if: steps.detect_mode.outputs.run_curation == 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: kiaasa-curation-logs-${{ github.run_number }}
          path: |
            sound_curation.log
            video_curation.log
            Scripts/FB/kiaasa_ai_*_log.json
          retention-days: 30
          if-no-files-found: warn

      - name: 📋 Create GitHub Step Summary
        if: always()
        run: |
          echo "# 👗 Kiaasa Pune Dhanori - Workflow Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.detect_mode.outputs.run_curation }}" == "true" ]; then
            echo "## 🎨 Biweekly Content Curation" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Mode**: Content Curation (1st or 15th of month)" >> $GITHUB_STEP_SUMMARY
            echo "**Date**: $(date -u +'%Y-%m-%d %H:%M:%S') UTC" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Task | Status |" >> $GITHUB_STEP_SUMMARY
            echo "|------|--------|" >> $GITHUB_STEP_SUMMARY

            SOUND_STATUS="${{ steps.curate_sounds.outputs.sound_status }}"
            if [ "$SOUND_STATUS" == "0" ]; then
              echo "| 🎵 Sound Curation | ✅ SUCCESS |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| 🎵 Sound Curation | ⚠️ WARNING |" >> $GITHUB_STEP_SUMMARY
            fi

            VIDEO_STATUS="${{ steps.curate_videos.outputs.video_status }}"
            if [ "$VIDEO_STATUS" == "0" ]; then
              echo "| 🎬 Video Curation | ✅ SUCCESS |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| 🎬 Video Curation | ⚠️ WARNING |" >> $GITHUB_STEP_SUMMARY
            fi

            echo "" >> $GITHUB_STEP_SUMMARY
            echo "📦 **Artifacts**: Curation logs uploaded for review" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.detect_mode.outputs.run_posting }}" == "true" ]; then
            echo "## 📱 Daily Content Posting" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Mode**: Content Distribution (3x/day)" >> $GITHUB_STEP_SUMMARY
            echo "**Date**: $(date -u +'%Y-%m-%d %H:%M:%S') UTC" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            if [ "${{ steps.precheck.outputs.should_proceed }}" == "false" ]; then
              echo "⏸️ **Status**: Skipped (cooldown active)" >> $GITHUB_STEP_SUMMARY
            else
              echo "✅ **Status**: Posted to FB/IG/YT" >> $GITHUB_STEP_SUMMARY
            fi
          fi

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
