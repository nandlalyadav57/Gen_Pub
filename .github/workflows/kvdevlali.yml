# This workflow is DR-enabled with automatic failover
# Generated by: enable_dr_for_workflow.sh

name: 🏫 KV Devlali - Alumni Community (Facebook)

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "dry_run (true/false)"
        required: false
        default: "false"

  schedule:
    # VIRAL-OPTIMIZED Spiritual India (Prayer times)
    - cron: "30 0 * * *"    # 6:00 AM IST - Morning aarti
    - cron: "30 6 * * *"    # 12:00 PM IST - Midday devotional
    - cron: "30 12 * * *"   # 6:00 PM IST - Evening aarti
    
permissions:
  contents: write  # Required to persist content history


jobs:
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # GATEKEEPER: DR Failover Control
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  post_KVDevlali:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      # SKIP-FAST PRE-CHECK: Exit early if cooldown active (saves ~1min)
      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      - name: 🚦 Pre-check Cooldown (Skip-Fast)
        id: precheck
        run: |
          HISTORY_FILE="Scripts/FB/kvdevlali_content_history.json"

          # If no history, proceed
          if [ ! -f "$HISTORY_FILE" ]; then
            echo "ℹ️  No history file - first run, proceeding..."
            echo "should_proceed=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Extract last post date and calculate days since
          LAST_POST=$(jq -r '.posts[-1].date // empty' "$HISTORY_FILE")

          if [ -z "$LAST_POST" ]; then
            echo "ℹ️  No posts in history - proceeding..."
            echo "should_proceed=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Calculate hours since last post
          LAST_EPOCH=$(date -d "$LAST_POST" +%s 2>/dev/null || echo 0)
          NOW_EPOCH=$(date +%s)
          HOURS_SINCE=$(( ($NOW_EPOCH - $LAST_EPOCH) / 3600 ))
          DAYS_SINCE=$(echo "scale=1; $HOURS_SINCE / 24" | bc)

          echo "📅 Last post: $LAST_POST"
          echo "⏱️  Hours since: $HOURS_SINCE ($DAYS_SINCE days)"

          # Cooldown threshold: 0.2 days = 4.8 hours (5x daily posting strategy)
          COOLDOWN_HOURS=5
          if [ "$HOURS_SINCE" -lt "$COOLDOWN_HOURS" ]; then
            HOURS_REMAINING=$(( $COOLDOWN_HOURS - $HOURS_SINCE ))
            echo "⏸️  COOLDOWN ACTIVE - skipping to save GitHub Actions minutes"
            echo "📊 Wait $HOURS_REMAINING more hour(s) before next post"
            echo "💡 Strategy: 3-4 posts per week for optimal engagement"
            echo "should_proceed=false" >> $GITHUB_OUTPUT
            exit 0
          else
            echo "✅ Cooldown passed ($HOURS_SINCE hours) - proceeding with post"
            echo "should_proceed=true" >> $GITHUB_OUTPUT
          fi

      # Skip all remaining steps if cooldown active
      - name: Check if should proceed
        if: steps.precheck.outputs.should_proceed != 'true'
        run: |
          echo "⏭️  Skipping remaining steps due to cooldown"
          exit 0
      # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      - name: Setup Python
        if: steps.precheck.outputs.should_proceed == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install system dependencies
        if: steps.precheck.outputs.should_proceed == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libsm6 libxext6 imagemagick
      - name: Install Python dependencies
        if: steps.precheck.outputs.should_proceed == 'true'
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install requests google-generativeai openai gTTS imageio
          python3 -m pip install "moviepy==1.0.3" "imageio[ffmpeg]"
      - name: Verify moviepy installation
        if: steps.precheck.outputs.should_proceed == 'true'
        run: |
          python3 -c "from moviepy.editor import VideoFileClip; print('moviepy.editor available ✅')"
      - name: Verify Facebook token file
        if: steps.precheck.outputs.should_proceed == 'true'
        run: |
          FB_FILE="Scripts/YT/Secrets_Sessions/Fb_Tokens.txt"
          if [ ! -f "$FB_FILE" ]; then
            echo "Error: Fb_Tokens.txt not found! Please generate it locally."
            exit 1
          else
            echo "Fb_Tokens.txt exists ✅"
          fi
      - name: Load Facebook token for Fact Factory
        if: steps.precheck.outputs.should_proceed == 'true'
        id: load_fb
        run: |
          FB_FILE="Scripts/YT/Secrets_Sessions/Fb_Tokens.txt"
          PAGE_ID=$(awk '/Devlali/{getline; print $NF}' "$FB_FILE")
          PAGE_TOKEN=$(awk '/Devlali/{getline; getline; print $NF}' "$FB_FILE")
          echo "Loaded Fact Factory page ID and token ✅"
          echo "FB_PAGE_ID=$PAGE_ID" >> $GITHUB_ENV
          echo "FB_PAGE_TOKEN=$PAGE_TOKEN" >> $GITHUB_ENV
      - name: Generate and Post KV Devlali Content
        if: steps.precheck.outputs.should_proceed == 'true'
        run: python3 Scripts/FB/kvdevlali.py
        env:
          KVDEVLALI_PAGE_ID: ${{ env.FB_PAGE_ID }}
          KVDEVLALI_PAGE_TOKEN: ${{ env.FB_PAGE_TOKEN }}
          FB_PAGE_ID: ${{ env.FB_PAGE_ID }}
          FB_PAGE_TOKEN: ${{ env.FB_PAGE_TOKEN }}

          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          # Enhanced HA Architecture: PRIMARY + BACKUP API Keys
          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━



          # Gemini Keys (PRIMARY tier with exponential backoff)
          GEMINI_API_KEY_PRIMARY: ${{ secrets.GEMINI_API_KEY_PRIMARY }}
          GEMINI_API_KEY_PRIMARY_2: ${{ secrets.GEMINI_API_KEY_PRIMARY_2 }}
          GEMINI_API_KEY_PRIMARY_3: ${{ secrets.GEMINI_API_KEY_PRIMARY_3 }}
          GEMINI_API_KEY_PRIMARY_4: ${{ secrets.GEMINI_API_KEY_PRIMARY_4 }}
          GEMINI_API_KEY_PRIMARY_5: ${{ secrets.GEMINI_API_KEY_PRIMARY_5 }}

          # Gemini Keys (BACKUP tier)
          GEMINI_API_KEY_BACKUP: ${{ secrets.GEMINI_API_KEY_BACKUP }}
          GEMINI_API_KEY_BACKUP_2: ${{ secrets.GEMINI_API_KEY_BACKUP_2 }}
          GEMINI_API_KEY_BACKUP_3: ${{ secrets.GEMINI_API_KEY_BACKUP_3 }}

          # OpenAI Keys (PRIMARY + BACKUP)
          OPENAI_API_KEY_PRIMARY: ${{ secrets.OPENAI_API_KEY_PRIMARY }}
          OPENAI_API_KEY_BACKUP: ${{ secrets.OPENAI_API_KEY_BACKUP }}

          # Note: Enhanced HA keys are auto-discovered by api_key_manager_enhanced.py

          DRY_RUN: ${{ github.event.inputs.dry_run }}

      # Disabled to reduce commit notifications - commit manually 1-2x per day
      # - name: 💾 Persist Content History (Duplicate Prevention)
      #   if: always()
      #   run: |
      #     cd Scripts/FB
      #
      #     # Check if history file exists
      #     if [ -f "kvdevlali_content_history.json" ]; then
      #       echo "✅ History file found - committing to prevent duplicates"
      #
      #       # Configure git
      #       git config user.name "github-actions[bot]"
      #       git config user.email "github-actions[bot]@users.noreply.github.com"
      #
      #       # Add and commit history file
      #       git add kvdevlali_content_history.json
      #
      #       # Only commit if there are changes
      #       if ! git diff --cached --quiet; then
      #         git commit -m "chore: update KV Devlali content history [skip ci]"
      #         git push
      #         echo "✅ History persisted to prevent duplicate posts"
      #       else
      #         echo "ℹ️  No history changes to commit"
      #       fi
      #     else
      #       echo "ℹ️  No history file generated this run"
      #     fi
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # NOTIFICATION: Runs when workflow is skipped
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
