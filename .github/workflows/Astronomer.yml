name: 🚀 Astronomer - DataOps & Airflow Insights (Facebook)

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "dry_run (true/false)"
        required: false
        default: "false"

  schedule:
    - cron: "30 5 * * *"   # 11:00 AM IST daily (5:30 AM UTC) - Script enforces 48-hour cooldown

permissions:
  contents: write  # Required to persist content history

jobs:
  post_Astronomer:
    timeout-minutes: 20
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install requests python-dotenv google-generativeai openai

      - name: Verify Facebook token file
        run: |
          FB_FILE="Scripts/YT/Secrets_Sessions/Fb_Tokens.txt"
          if [ ! -f "$FB_FILE" ]; then
            echo "Error: Fb_Tokens.txt not found!"
            exit 1
          else
            echo "Fb_Tokens.txt exists ✅"
          fi

      - name: Load Facebook token for Astronomer Inc
        id: load_fb
        run: |
          FB_FILE="Scripts/YT/Secrets_Sessions/Fb_Tokens.txt"
          PAGE_ID=$(awk '/Astronomer/{getline; print $NF}' "$FB_FILE")
          PAGE_TOKEN=$(awk '/Astronomer/{getline; getline; print $NF}' "$FB_FILE")
          echo "Loaded Astronomer Inc page ID and token ✅"
          echo "FB_PAGE_ID=$PAGE_ID" >> $GITHUB_ENV
          echo "FB_PAGE_TOKEN=$PAGE_TOKEN" >> $GITHUB_ENV

      - name: Generate and Post Astronomer Content
        run: python3 Scripts/FB/Astronomer.py
        env:
          ASTRONOMER_PAGE_ID: ${{ env.FB_PAGE_ID }}
          ASTRONOMER_PAGE_TOKEN: ${{ env.FB_PAGE_TOKEN }}
          FB_PAGE_ID_3: ${{ env.FB_PAGE_ID }}
          FB_PAGE_TOKEN_3: ${{ env.FB_PAGE_TOKEN }}

          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          # Enhanced HA Architecture: PRIMARY + BACKUP API Keys
          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

          # Gemini Keys (PRIMARY tier with exponential backoff)
          GEMINI_API_KEY_PRIMARY: ${{ secrets.GEMINI_API_KEY_PRIMARY }}
          GEMINI_API_KEY_PRIMARY_2: ${{ secrets.GEMINI_API_KEY_PRIMARY_2 }}
          GEMINI_API_KEY_PRIMARY_3: ${{ secrets.GEMINI_API_KEY_PRIMARY_3 }}
          GEMINI_API_KEY_PRIMARY_4: ${{ secrets.GEMINI_API_KEY_PRIMARY_4 }}
          GEMINI_API_KEY_PRIMARY_5: ${{ secrets.GEMINI_API_KEY_PRIMARY_5 }}

          # Gemini Keys (BACKUP tier)
          GEMINI_API_KEY_BACKUP: ${{ secrets.GEMINI_API_KEY_BACKUP }}
          GEMINI_API_KEY_BACKUP_2: ${{ secrets.GEMINI_API_KEY_BACKUP_2 }}
          GEMINI_API_KEY_BACKUP_3: ${{ secrets.GEMINI_API_KEY_BACKUP_3 }}

          # OpenAI Keys (PRIMARY + BACKUP)
          OPENAI_API_KEY_PRIMARY: ${{ secrets.OPENAI_API_KEY_PRIMARY }}
          OPENAI_API_KEY_BACKUP: ${{ secrets.OPENAI_API_KEY_BACKUP }}

          # Note: Enhanced HA keys are auto-discovered by api_key_manager_enhanced.py

          DRY_RUN: ${{ github.event.inputs.dry_run }}
