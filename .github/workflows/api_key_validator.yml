          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          # ANALYZE MONTH-END USAGE & GENERATE RECOMMENDATIONS
          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          print("\n" + "="*70)
          print("📊 MONTH-END USAGE ANALYSIS & RECOMMENDATIONS")
          print("="*70)

          # Analyze workflow logs from GitHub Actions for the past month
          import subprocess

          try:
              # Get last 30 days of workflow runs with detailed data
              gh_runs = subprocess.run(
                  ['gh', 'run', 'list', '--limit', '1000', '--json', 'conclusion,createdAt,name,databaseId'],
                  capture_output=True, text=True, check=True
              )

              import json as json_lib
              runs_data = json_lib.loads(gh_runs.stdout)

              # Track actual API usage by parsing workflow logs
              from datetime import datetime, timedelta
              month_ago = datetime.now() - timedelta(days=30)

              content_workflows = [
                  '💰 ITR', '📚 NMU', '🚀 Astronomer', '👗 Kiaasa',
                  '🏭 Fact Factory', '🎓 KV Devlali', '📺 YouTube'
              ]

              # Counters for actual usage
              provider_usage = {
                  'openrouter': 0,
                  'fireworks': 0,
                  'gemini': 0,
                  'openai': 0,
                  'pexels': 0,
                  'rate_limited': 0,
                  'failed_runs': 0
              }

              monthly_runs = 0
              analyzed_runs = 0

              print(f"\n🔍 Analyzing workflow logs for actual API usage...")

              for run in runs_data[:100]:  # Analyze last 100 runs (avoid timeout)
                  run_date = datetime.fromisoformat(run['createdAt'].replace('Z', '+00:00'))
                  if run_date < month_ago:
                      continue

                  if any(wf in run['name'] for wf in content_workflows):
                      monthly_runs += 1

                      if run['conclusion'] == 'success':
                          # Try to get logs to see which provider succeeded
                          try:
                              run_id = run['databaseId']
                              logs = subprocess.run(
                                  ['gh', 'run', 'view', str(run_id), '--log'],
                                  capture_output=True, text=True, timeout=5
                              )

                              log_text = logs.stdout.lower()

                              # Detect which provider was used
                              if '✅ success' in log_text and 'openrouter' in log_text:
                                  provider_usage['openrouter'] += 1
                              elif '✅ success' in log_text and 'fireworks' in log_text:
