name: 🔑 Monthly Key Validator - API Health Check

on:
  workflow_dispatch:
  schedule:
    - cron: "0 23 28-31 * *"  # Run on days 28-31 at 11 PM UTC (checks if last day before executing)

permissions:
  contents: read

jobs:
  validate_all_keys:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check if last day of month
        id: check_date
        run: |
          # Get tomorrow's date
          TOMORROW=$(date -u -d "+1 day" +%d)

          # If tomorrow is the 1st, today is the last day of the month
          if [ "$TOMORROW" = "01" ]; then
            echo "✅ Today is the last day of the month - proceeding with validation"
            echo "is_last_day=true" >> $GITHUB_OUTPUT
          else
            echo "⏭️  Not the last day of month - skipping (will run on actual month-end)"
            echo "is_last_day=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Python
        if: steps.check_date.outputs.is_last_day == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        if: steps.check_date.outputs.is_last_day == 'true'
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install requests

      - name: 🧪 Test All API Keys (Gemini, OpenAI, Pexels)
        if: steps.check_date.outputs.is_last_day == 'true'
        env:
          # SMTP Configuration (for sending email reports)
          SMTP_SERVER: ${{ secrets.SMTP_SERVER || 'smtp.gmail.com' }}
          SMTP_PORT: ${{ secrets.SMTP_PORT || '587' }}
          SMTP_USER: ${{ secrets.SMTP_USER || 'nandlalyadav57@gmail.com' }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD || secrets.GMAIL_APP_PASSWORD }}
        run: |
          python3 << 'EOFPYTHON'
          import requests
          import csv
          import sys
          import json
          import smtplib
          import os
          from collections import defaultdict
          from datetime import datetime
          from email.mime.text import MIMEText
          from email.mime.multipart import MIMEMultipart
          from pathlib import Path

          print("="*70)
          print("🔑 API KEY VALIDATOR - Testing All Keys from CSV")
          print("="*70)
          print("⚡ OPTIMIZED: Using max_tokens=1 to minimize quota usage")
          print("="*70)

          csv_file = "Scripts/keys/master_email_api_list.csv"
          results = {
              'gemini': {'working': [], 'failed': []},
              'openai': {'working': [], 'failed': []},
              'openrouter': {'working': [], 'failed': []},
              'fireworks': {'working': [], 'failed': []},
              'mistral': {'working': [], 'failed': []},
              'deepseek': {'working': [], 'failed': []},
              'pexels': {'working': [], 'failed': []},
              'pixabay': {'working': [], 'failed': []}
          }

          # Read CSV
          with open(csv_file, 'r', encoding='utf-8') as f:
              reader = csv.DictReader(f)
              rows = list(reader)

          total_keys = sum([
              len([r for r in rows if r.get('Gemini_Key', '').strip()]),
              len([r for r in rows if r.get('OpenAI_Key', '').strip()]),
              len([r for r in rows if r.get('OpenRouter_Key', '').strip()]),
              len([r for r in rows if r.get('Fireworks_Key', '').strip()]),
              len([r for r in rows if r.get('Mistral_Key', '').strip()]),
              len([r for r in rows if r.get('DeepSeek_Key', '').strip()]),
              len([r for r in rows if r.get('Pexels_Key', '').strip()]),
              len([r for r in rows if r.get('Pixabay_Key', '').strip()])
          ])

          print(f"\n📊 Found {total_keys} total API keys to test")
          print(f"   - {len([r for r in rows if r.get('Gemini_Key', '').strip()])} Gemini keys")
          print(f"   - {len([r for r in rows if r.get('OpenAI_Key', '').strip()])} OpenAI keys")
          print(f"   - {len([r for r in rows if r.get('OpenRouter_Key', '').strip()])} OpenRouter keys")
          print(f"   - {len([r for r in rows if r.get('Fireworks_Key', '').strip()])} Fireworks keys")
          print(f"   - {len([r for r in rows if r.get('Mistral_Key', '').strip()])} Mistral keys")
          print(f"   - {len([r for r in rows if r.get('DeepSeek_Key', '').strip()])} DeepSeek keys")
          print(f"   - {len([r for r in rows if r.get('Pexels_Key', '').strip()])} Pexels keys")
          print(f"   - {len([r for r in rows if r.get('Pixabay_Key', '').strip()])} Pixabay keys")
          print()

